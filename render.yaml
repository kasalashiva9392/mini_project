# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Recommended stack with Neon: connect repo → New Blueprint → this file (see README "Recommended production path").
#
# Free instances spin down when idle; they do not support SSH, scaling, one-off jobs, or
# persistent disks — use Neon for data. Upgrade ucc-api to a paid instance in the dashboard
# when you need always-on Socket.IO or SSH; static site can stay on the free tier.
#
# Before first deploy: create secrets in the dashboard (or set sync: false vars when prompted):
#   API: DATABASE_URL (Neon), JWT_SECRET, CLIENT_URL (your static site URL(s), comma-separated)
#   Web: VITE_API_URL = public API URL (e.g. https://ucc-api.onrender.com) — set AFTER the API is live, then clear build cache & redeploy.

services:
  - type: web
    name: ucc-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run render-build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2

  - type: web
    name: ucc-web
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
